<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bouncing OpenObject Logo</title>
  <style>
    /* Design tokens for the control panel. */
    :root {
      --bg: #0e0e0f;
      --panel: #161618;
      --panel-2: #1d1d20;
      --line: #2a2a2e;
      --text: #ececed;
      --muted: #8a8a90;
      --accent: #c8c8cf;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #000;            /* edge-to-edge black stage */
      overflow: hidden;
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    }

    /* The bouncing mark. Wrapper carries position (translate); the inner SVG carries color + the
       pulse scale, so the two never fight. */
    #logo-wrap { position: absolute; top: 0; left: 0; will-change: transform; }
    #logo-wrap svg { width: 100%; height: 100%; display: block; color: #fff; }

    /* Corner-hit effect layer — flashes, rings, confetti. Above the art, never interactive. */
    #fx { position: fixed; inset: 0; pointer-events: none; z-index: 40; overflow: hidden; }
    .fx-flash { position: fixed; inset: 0; }
    .fx-ring  { position: fixed; border: 3px solid #fff; border-radius: 50%;
                transform: translate(-50%, -50%); box-sizing: border-box; }
    .fx-conf  { position: fixed; border-radius: 0; will-change: transform; }  /* size set per-particle */

    /* Invisible top-right hover trigger — reveal the panel only when sought. */
    #hover-zone { position: fixed; top: 0; right: 0; width: 160px; height: 160px; z-index: 99; }

    /* Auto-hidden control panel. */
    #panel {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 100;
      width: 264px;
      background: rgba(22, 22, 24, 0.92);   /* --panel, translucent */
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px 16px 18px;
      color: var(--text);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #panel.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .oo-head { display: flex; align-items: baseline; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .oo-head .name { font-weight: 600; letter-spacing: 0.02em; font-size: 14px; }
    .oo-head .sub  { color: var(--muted); font-size: 12px; }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field > .label { display: flex; justify-content: space-between; align-items: baseline; }
    .field .label span:first-child { color: var(--muted); font-size: 13px; }
    .field .label .val { color: var(--text); font-size: 12px; font-variant-numeric: tabular-nums; }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px; border-radius: 3px;
      background: var(--line); accent-color: var(--accent); cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text); border: none; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text); border: none; cursor: pointer;
    }

    .opts { display: flex; flex-direction: column; gap: 5px; }
    .opt {
      appearance: none; text-align: left; cursor: pointer;
      background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 8px; padding: 7px 10px; color: var(--muted);
      font: inherit; line-height: 1.3;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .opt:hover { color: var(--text); background: #242428; }
    .opt.on { background: #2c2c33; border-color: #3a3a42; color: var(--text); }
    .opt .opt-label { display: block; font-size: 13px; font-weight: 500; }
  </style>
</head>

  </div>

  <div id="hover-zone"></div>

  <div id="panel">
    <div class="oo-head">
      <span class="name">OpenObject</span>
      <span class="sub">Bouncing Logo</span>
    </div>

    <div class="field">
      <div class="label"><span>Speed</span><span class="val" id="speed-val">2.5&times;</span></div>
      <input type="range" id="speed" min="1" max="12" step="0.5" value="2.5"/>
    </div>

    <div class="field">
      <div class="label"><span>Size</span><span class="val" id="size-val">16%</span></div>
      <input type="range" id="size" min="5" max="40" step="1" value="16"/>
    </div>

    <div class="field">
      <div class="label"><span>Corner effect</span></div>
      <div class="opts" id="corner">
        <button class="opt on" data-mode="confetti"><span class="opt-label">Confetti</span></button>
        <button class="opt" data-mode="flash"><span class="opt-label">Flash</span></button>
        <button class="opt" data-mode="pulse"><span class="opt-label">Pulse</span></button>
        <button class="opt" data-mode="shockwave"><span class="opt-label">Shockwave</span></button>
        <button class="opt" data-mode="none"><span class="opt-label">None</span></button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    // ── Color cycle ──────────────────────────────────────────────────
    // The logo's color changes on EVERY wall hit, cycling through presets. That auto-change is the
    // whole effect, so there is no color picker: a clean, vivid set (white + saturated hues), stepped
    // in order so adjacent bounces never repeat a color.
    const PALETTE = ['#ffffff', '#ff3b30', '#ff9f0a', '#ffd60a', '#32d74b', '#64d2ff', '#0a84ff', '#bf5af2', '#ff375f'];
    let colorIndex = 0;

    // ── State ────────────────────────────────────────────────────────
    let speed = 2.5;        // 1..12, resolution-relative (see vMag below)
    let sizePct = 16;       // logo height as a % of the viewport's short side (form-factor safe)
    let cornerMode = 'confetti';

    const SPEED_K = 0.09;   // short-sides/sec per speed unit: speed 2 ≈ a calm ~5.5s crossing on any screen
    let ASPECT = 1;         // logo width/height, measured from the real ink box at boot

    let W = 0, H = 0, shortSide = 0, logoW = 0, logoH = 0;
    let x = 0, y = 0, vx = 0, vy = 0;   // (vx,vy) is a unit direction; speed is applied via vMag
    let lastTime = null;

    // ── DOM ──────────────────────────────────────────────────────────
    const wrap   = document.getElementById('logo-wrap');
    const logo   = document.getElementById('logo');
    const fx     = document.getElementById('fx');
    const panel  = document.getElementById('panel');
    const hover  = document.getElementById('hover-zone');

    // ── Color ────────────────────────────────────────────────────────
    function applyColor() { logo.style.color = PALETTE[colorIndex]; }
    function nextColor()  { colorIndex = (colorIndex + 1) % PALETTE.length; applyColor(); }

    // ── Corner-hit effects ───────────────────────────────────────────
    function cornerEffect(cx, cy) {
      if (cornerMode === 'flash')     fxFlash();
      else if (cornerMode === 'pulse')     fxPulse();
      else if (cornerMode === 'shockwave') fxShock(cx, cy);
      else if (cornerMode === 'confetti')  fxConfetti(cx, cy);
    }
    function fxFlash() {
      // A RUN of color flashes, not one: the corner hit pulses through several palette colors over a
      // couple seconds so it reads as a celebration.
      const beats = 5;
      for (let i = 0; i < beats; i++) {
        const c = PALETTE[(colorIndex + 1 + i) % PALETTE.length];
        setTimeout(() => {
          const d = document.createElement('div');
          d.className = 'fx-flash';
          d.style.background = c;
          fx.appendChild(d);
          d.animate([{ opacity: 0.5 }, { opacity: 0 }], { duration: 560, easing: 'ease-out' })
            .onfinish = () => d.remove();
        }, i * 360);
      }
    }
    function fxPulse() {
      // PUMPS 5× per corner hit: five equal +30% pumps (grow/shrink). Tune `pumps` for more/fewer.
      const pumps = 5, frames = [{ transform: 'scale(1)' }];
      for (let i = 0; i < pumps; i++) frames.push({ transform: 'scale(1.30)' }, { transform: 'scale(1)' });
      logo.animate(frames, { duration: pumps * 570, easing: 'ease-in-out' });
    }
    function fxShock(cx, cy) {
      // The shockwave PULSES 5 TIMES per corner hit — five rings spaced 500ms so they read as distinct
      // beams, each thick→thin as it expands off the panel. First pulse fires instantly.
      const pulse = (i) => {
        const r = document.createElement('div');
        r.className = 'fx-ring';
        r.style.left = cx + 'px';
        r.style.top = cy + 'px';
        r.style.borderColor = PALETTE[(colorIndex + i) % PALETTE.length];
        fx.appendChild(r);
        r.animate([
          { width: '0px', height: '0px', opacity: 0.9, borderWidth: '7px' },
          { width: '130vmin', height: '130vmin', opacity: 0, borderWidth: '1px' }
        ], { duration: 950, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => r.remove();
      };
      const PULSES = 5, GAP = 500;
      pulse(0);
      for (let i = 1; i < PULSES; i++) setTimeout(() => pulse(i), i * GAP);
    }
    function fxConfetti(cx, cy) {
      // The confetti THROWS TWICE per corner hit (two waves ~380ms apart) for a denser, longer splash.
      const inX = cx < W / 2 ? 1 : -1;     // shoot inward, away from the wall
      const inY = cy < H / 2 ? 1 : -1;
      const M = Math.max(W, H);            // spread scales with the screen, so it splashes far out, any size
      const throwOnce = () => {
        const N = 350;                     // particles per throw (tune here for more/less)
        for (let i = 0; i < N; i++) {
          const p = document.createElement('div');
          p.className = 'fx-conf';
          const t = Math.random();                                            // 0 = near the corner, 1 = far out
          const dist = (0.05 + t * t * 0.55) * M;                             // t^2 = dense core, sparse stragglers
          const ang = (0.03 + Math.random() * 0.95) * Math.PI / 2;            // a full ~90° fan off the corner
          const s = ((2 + Math.random() * 4) * (1 - 0.35 * t)).toFixed(1);    // small pixels; far ones a touch smaller
          p.style.width = s + 'px'; p.style.height = s + 'px';
          p.style.left = cx + 'px';
          p.style.top = cy + 'px';
          p.style.background = PALETTE[(Math.random() * PALETTE.length) | 0]; // any color, incl. white sparks
          fx.appendChild(p);
          const dx = inX * Math.cos(ang) * dist;
          const dy = inY * Math.sin(ang) * dist - Math.random() * 0.04 * M;   // a little upward pop
          const fall = dy + (0.14 + Math.random() * 0.24) * M;               // then gravity carries them down
          const spin = (Math.random() * 900 - 450) | 0;
          p.animate([
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1, offset: 0 },
            { transform: `translate(${dx | 0}px, ${dy | 0}px) rotate(${spin}deg)`, opacity: 1, offset: 0.7 },
            { transform: `translate(${(dx * 1.12) | 0}px, ${fall | 0}px) rotate(${(spin * 1.7) | 0}deg)`, opacity: 0, offset: 1 }
          ], { duration: 1200 + Math.random() * 800, easing: 'cubic-bezier(.18,.7,.4,1)' })
            .onfinish = () => p.remove();
        }
      };
      // Three throws spaced 850ms apart so each reads as a distinct wave.
      const THROWS = 3, GAP = 850;
      throwOnce();
      for (let i = 1; i < THROWS; i++) setTimeout(throwOnce, i * GAP);
    }

    // ── Sizing (resolution + form-factor independent) ────────────────
    // The logo height is a fraction of the short side, so it looks the same on a widescreen and a
    // square screen. Width follows the measured ink aspect. Only touch the DOM when the size changes.
    function computeDims() {
      W = window.innerWidth; H = window.innerHeight;
      shortSide = Math.min(W, H);
      const h = Math.max(24, (sizePct / 100) * shortSide);
      if (h !== logoH) {
        logoH = h; logoW = h * ASPECT;
        wrap.style.height = logoH + 'px';
        wrap.style.width = logoW + 'px';
      }
    }

    // ── Animation loop ───────────────────────────────────────────────
    function loop(ts) {
      if (lastTime === null) lastTime = ts;
      const dt = Math.min(ts - lastTime, 50);   // clamp after a tab-switch so it doesn't teleport
      lastTime = ts;

      computeDims();
      const step = speed * SPEED_K * shortSide * dt / 1000;
      x += vx * step;
      y += vy * step;

      // Keep the mark on screen even if it was resized into a wall.
      const maxX = Math.max(0, W - logoW), maxY = Math.max(0, H - logoH);
      let bX = false, bY = false, cornerX = 0, cornerY = 0;
      if (x <= 0)     { x = 0;    if (vx < 0) { vx = -vx; bX = true; cornerX = 0; } }
      if (x >= maxX)  { x = maxX; if (vx > 0) { vx = -vx; bX = true; cornerX = W; } }
      if (y <= 0)     { y = 0;    if (vy < 0) { vy = -vy; bY = true; cornerY = 0; } }
      if (y >= maxY)  { y = maxY; if (vy > 0) { vy = -vy; bY = true; cornerY = H; } }

      if (bX || bY) {
        nextColor();
        if (bX && bY) cornerEffect(cornerX, cornerY);   // the holy grail
      }

      wrap.style.transform = `translate(${Math.round(x)}px, ${Math.round(y)}px)`;
      requestAnimationFrame(loop);
    }

    // ── Panel: auto-hide ─────────────────────────────────────────────
    let hideTimer;
    const reveal = () => { clearTimeout(hideTimer); panel.classList.add('visible'); };
    const scheduleHide = () => { hideTimer = setTimeout(() => panel.classList.remove('visible'), 500); };
    hover.addEventListener('mouseenter', reveal);
    hover.addEventListener('mouseleave', scheduleHide);
    panel.addEventListener('mouseenter', () => clearTimeout(hideTimer));
    panel.addEventListener('mouseleave', scheduleHide);

    // ── Panel: controls ──────────────────────────────────────────────
    const speedEl = document.getElementById('speed');
    const sizeEl  = document.getElementById('size');
    const speedVal = document.getElementById('speed-val');
    const sizeVal  = document.getElementById('size-val');

    speedEl.addEventListener('input', e => {
      speed = parseFloat(e.target.value);
      speedVal.textContent = speed.toFixed(1) + '×';
    });
    sizeEl.addEventListener('input', e => {
      sizePct = parseInt(e.target.value, 10);
      sizeVal.textContent = sizePct + '%';
    });
    document.querySelectorAll('#corner .opt').forEach(btn => {
      btn.addEventListener('click', () => {
        cornerMode = btn.dataset.mode;
        document.querySelectorAll('#corner .opt').forEach(b => b.classList.toggle('on', b === btn));
      });
    });

    // ── Boot ─────────────────────────────────────────────────────────
    function start() {
      // Measure the real ink box so the bounce is tight to the glyphs (the 2048 art box is padded),
      // then crop the viewBox to it. Falls back to the square box if measurement isn't ready.
      try {
        const bb = logo.getBBox();
        if (bb.width > 0 && bb.height > 0) {
          const pad = 4;
          logo.setAttribute('viewBox', `${bb.x - pad} ${bb.y - pad} ${bb.width + pad * 2} ${bb.height + pad * 2}`);
          ASPECT = bb.width / bb.height;
        }
      } catch (_) { /* keep the square fallback */ }

      applyColor();
      computeDims();
      x = Math.random() * Math.max(0, W - logoW);
      y = Math.random() * Math.max(0, H - logoH);
      const angle = Math.PI / 4 + (Math.random() - 0.5) * Math.PI / 4;   // a gentle diagonal drift
      vx = Math.cos(angle) * (Math.random() < 0.5 ? 1 : -1);
      vy = Math.sin(angle) * (Math.random() < 0.5 ? 1 : -1);
      const mag = Math.hypot(vx, vy); vx /= mag; vy /= mag;
      wrap.style.transform = `translate(${Math.round(x)}px, ${Math.round(y)}px)`;
      requestAnimationFrame(loop);
    }

    // Wait one frame so the inline SVG is laid out before getBBox().
    requestAnimationFrame(() => requestAnimationFrame(start));
  </script>

<script>
(function(){
  var qs = new URLSearchParams(location.search);
  var sp = parseFloat(qs.get('oo_speed'));
  var sz = parseFloat(qs.get('oo_size'));
  var cm = qs.get('oo_corner');
  var n = 0;
  var iv = setInterval(function(){
    if (++n > 300) { clearInterval(iv); return; }   // ~30s safety
    try { void speed; void sizePct; void cornerMode; } catch (e) { return; } // bindings not ready yet (TDZ)
    clearInterval(iv);
    try {
      if (!isNaN(sp)) speed = Math.max(1, Math.min(12, sp));
      if (!isNaN(sz)) sizePct = Math.max(5, Math.min(40, sz));
      if (cm) cornerMode = cm;
    } catch (e) {}
  }, 50);
})();
</script>
